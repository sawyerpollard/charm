# Charm dev environment.
#
# Philosophy: build the *real* (static musl) binary on the host - the exact
# artifact we ship - and run it inside a local AlmaLinux VM (Lima) that mirrors
# the production VPS. The VM has its own systemd + dockerd + native Caddy; it is
# the runtime target, never a build host.

[tools]
rust = "stable"
zig = "latest"
"cargo:cargo-zigbuild" = "latest"

[env]
CHARM_VM = "charm-dev"
# Host is arm64 → Lima guest is aarch64 → build an aarch64 musl binary.
CHARM_TARGET = "aarch64-unknown-linux-musl"
CHARM_DOMAIN = "charm.test"
# Dedicated key for pushing to the dev VM (generated by `mise run keygen`).
CHARM_KEY = "{{env.HOME}}/.ssh/charm_dev"

# --- host-side, fast feedback (no Linux needed) ---------------------------

[tasks.check]
description = "Type-check + lint on the host"
run = "cargo check && cargo clippy"

[tasks.test]
description = "Unit tests on the host"
run = "cargo test"

[tasks.setup]
description = "Add the musl target to the toolchain"
run = "rustup target add $CHARM_TARGET"

[tasks.build]
description = "Cross-compile the shippable static musl binary"
depends = ["setup"]
run = "cargo zigbuild --release --target $CHARM_TARGET"

# --- the dev VM (a local 'VPS') -------------------------------------------

[tasks.vm-up]
description = "Start the AlmaLinux VM (installs docker + native caddy on first boot)"
run = "limactl start --name=$CHARM_VM --tty=false .lima/charm-dev.yaml"

[tasks.vm-down]
description = "Stop the dev VM"
run = "limactl stop $CHARM_VM"

[tasks.vm-destroy]
description = "Delete the dev VM"
run = "limactl delete -f $CHARM_VM"

[tasks.shell]
description = "Shell into the dev VM"
run = "limactl shell $CHARM_VM"

[tasks.keygen]
description = "Generate a dedicated SSH key for pushing to the dev VM"
run = '[ -f "$CHARM_KEY" ] || ssh-keygen -t ed25519 -N "" -f "$CHARM_KEY" -C charm-dev'

# --- the loop -------------------------------------------------------------

[tasks.install]
description = "Copy the built binary into the VM and run `charm install`"
depends = ["build", "keygen"]
run = '''
bin="$PWD/target/$CHARM_TARGET/release/charm"
limactl shell $CHARM_VM sudo install -m 0755 "$bin" /usr/bin/charm
limactl shell $CHARM_VM sudo charm install --ssh-key "$(cat "$CHARM_KEY.pub")"
limactl shell $CHARM_VM sudo charm domain add "$CHARM_DOMAIN"
'''

[tasks.push]
description = "Push the sample app to the dev VM (end-to-end test)"
run = '''
set -eu
# Lima's generated ssh.config holds the forwarded port (avoids a Go-template
# brace clash with mise's own templating).
port=$(awk '/^[[:space:]]*Port /{print $2; exit}' "$HOME/.lima/$CHARM_VM/ssh.config")
tmp=$(mktemp -d)
cp -R examples/demo/. "$tmp/"
git -C "$tmp" init -q
git -C "$tmp" add -A
git -C "$tmp" -c user.email=dev@charm -c user.name=dev commit -qm demo
GIT_SSH_COMMAND="ssh -i $CHARM_KEY -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
  git -C "$tmp" push "ssh://charm@127.0.0.1:$port/demo" +HEAD:main
rm -rf "$tmp"
'''

[tasks.push-compose]
description = "Push the compose sample app to the dev VM"
run = '''
set -eu
port=$(awk '/^[[:space:]]*Port /{print $2; exit}' "$HOME/.lima/$CHARM_VM/ssh.config")
tmp=$(mktemp -d)
cp -R examples/compose-demo/. "$tmp/"
git -C "$tmp" init -q
git -C "$tmp" add -A
git -C "$tmp" -c user.email=dev@charm -c user.name=dev commit -qm compose-demo
GIT_SSH_COMMAND="ssh -i $CHARM_KEY -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
  git -C "$tmp" push "ssh://charm@127.0.0.1:$port/compose-demo" +HEAD:main
rm -rf "$tmp"
'''

[tasks.reset]
description = "Fresh VM + install from scratch"
run = "mise run vm-destroy || true; mise run vm-up && mise run install"
